name = "dba-kb-contrib"
main = "worker.js"
compatibility_date = "2024-11-01"

# Browser origin allowed to call the proxy (your GitHub Pages site).
# Secrets (set via `wrangler secret put`, NOT here): GH_TOKEN, TURNSTILE_SECRET
[vars]
ALLOWED_ORIGIN = "https://ggu-dba-kb-genai.github.io"
INBOX_REPO     = "ggu-dba-kb-genai/dba-kb-contrib-inbox"   # PRIVATE inbox repo
INBOX_BRANCH   = "main"
RATE_MAX_DAY   = "5"
RATE_MAX_MIN   = "2"

# Per-IP rate-limit counters. Create with:
#   wrangler kv namespace create RATE_LIMIT
# then paste the returned id below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id      = "0ce6f1fa98db4ca28c27f260a3b888af"
